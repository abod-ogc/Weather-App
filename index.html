<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>Weather App (Public API)</h2>
            <p> Search any city → get current weather + 7-day forecast.</p>
        </header>
        <div class="search_area">
            <input type="text" id="city-input" placeholder="Enter a city name.. (e.g., London, Tokyo, New York)" />
            <button id="search-btn" class="primary-btn">Search</button>
            <button id="default-location-btn" class="secondary-btn">Use Sanaa</button>
        </div>
        <div class="cards-area">
            <div class="card-container">
                <div class="current-weather-container">
                    <h4 class="city-name">Amman, Jordan</h4>
                    <p class="city-location">Lat/Lon: 31.95522, 35.94503</p>
                    <h1 class="degree">25°C</h1>
                    <div>
                        <span class="humidity tag">Humidity: 31%</span>
                        <span class="wind tag">Wind: 9.5 km/h</span>
                    </div>
                    <p class="local-time">Local time: 2026-04-15T09:45 (Asia/Amman)</p>
                </div>
            </div>
            <div class="card-container forecast-container">
                <h4>7-Day Forecast</h4>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Min</th>
                            <th>Max</th>
                            <th>Rain</th>
                        </tr>
                    </thead>
                    <tbody class="forecast-data">
                        
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
